apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-demo-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  otel-demo-overview.json: |
    {
      "uid": "otel-demo-overview",
      "title": "OTel Demo Overview",
      "tags": ["otel-demo", "lgtm", "kubernetes"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "otel-demo Pod CPU",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"otel-demo\", container!=\"\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "title": "otel-demo Pod Memory",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"otel-demo\", container!=\"\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          }
        },
        {
          "id": 3,
          "title": "otel-demo Logs",
          "type": "logs",
          "datasource": {
            "type": "loki",
            "uid": "loki"
          },
          "targets": [
            {
              "expr": "{namespace=\"otel-demo\"}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 10,
            "w": 24,
            "x": 0,
            "y": 8
          }
        },
        {
          "id": 4,
          "title": "Kubernetes Pods Ready",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"otel-demo\", condition=\"true\"})",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 18
          }
        },
        {
          "id": 5,
          "title": "otel-demo Restarts",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"otel-demo\"}) by (pod)",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 6,
            "w": 16,
            "x": 8,
            "y": 18
          }
        }
      ]
    }
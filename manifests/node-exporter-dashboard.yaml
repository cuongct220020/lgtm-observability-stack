apiVersion: v1
kind: ConfigMap
metadata:
  name: node-exporter-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  node-exporter-overview.json: |
    {
      "uid": "node-exporter-overview",
      "title": "Node Exporter Overview",
      "tags": ["node-exporter", "kubernetes", "infrastructure"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 2,
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "CPU Usage by Node",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\", job=~\".*node-exporter.*\"}[5m])))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          }
        },
        {
          "id": 2,
          "title": "Memory Usage by Node",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "100 * (1 - (node_memory_MemAvailable_bytes{job=~\".*node-exporter.*\"} / node_memory_MemTotal_bytes{job=~\".*node-exporter.*\"}))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          }
        },
        {
          "id": 3,
          "title": "Writable Filesystem Usage by Node",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "100 * (1 - (node_filesystem_avail_bytes{job=~\".*node-exporter.*\", fstype=~\"ext4|xfs\", mountpoint=\"/var\"} / node_filesystem_size_bytes{job=~\".*node-exporter.*\", fstype=~\"ext4|xfs\", mountpoint=\"/var\"}))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 8
          }
        },
        {
          "id": 4,
          "title": "Network Receive by Node",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum by (instance) (rate(node_network_receive_bytes_total{job=~\".*node-exporter.*\", device!~\"lo|veth.*|cali.*|flannel.*\"}[5m]))",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 8
          }
        },
        {
          "id": 5,
          "title": "Node Exporter Targets Up",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(up{job=~\".*node-exporter.*\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 0,
            "y": 16
          }
        },
        {
          "id": 6,
          "title": "Writable Filesystem Free",
          "type": "stat",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "sum(node_filesystem_avail_bytes{job=~\".*node-exporter.*\", fstype=~\"ext4|xfs\", mountpoint=\"/var\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 8,
            "y": 16
          }
        },
        {
          "id": 7,
          "title": "Load Average (5m)",
          "type": "timeseries",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "node_load5{job=~\".*node-exporter.*\"}",
              "legendFormat": "{{instance}}",
              "refId": "A"
            }
          ],
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 16
          }
        }
      ]
    }
